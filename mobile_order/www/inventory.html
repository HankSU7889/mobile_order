<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>库存查询 - Mobile Order</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #333; }

        /* ==================== Header ==================== */
        .header { background: #007AFF; color: white; padding: 15px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
        .header h1 { font-size: 18px; font-weight: 600; }
        .header-actions { display: flex; gap: 10px; }
        .header-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .header-btn:active { background: rgba(255,255,255,0.3); }

        /* ==================== Filters ==================== */
        .filters { background: white; padding: 12px 15px; border-bottom: 1px solid #eee; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-input { flex: 1; min-width: 140px; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
        .filter-input:focus { outline: none; border-color: #007AFF; }
        .filter-select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; min-width: 120px; background: white; }
        .filter-select:focus { outline: none; border-color: #007AFF; }
        .filter-btn { padding: 10px 20px; background: #007AFF; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; white-space: nowrap; }
        .filter-btn:active { background: #0066CC; }
        .filter-btn.secondary { background: white; color: #666; border: 1px solid #ddd; }
        .filter-btn.secondary:active { background: #f0f0f0; }
        .include-disabled { display: none; }

        /* ==================== Stats Bar ==================== */
        .stats-bar { background: white; padding: 10px 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; font-size: 13px; color: #666; }
        .stats-bar span { color: #007AFF; font-weight: 600; }

        /* ==================== Table ==================== */
        .table-container { background: white; margin: 0; overflow: hidden; }
        .table-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        thead { background: #f8f8f8; position: sticky; top: 0; z-index: 10; }
        th { padding: 12px 15px; text-align: left; font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; border-bottom: 1px solid #eee; }
        td { padding: 12px 15px; font-size: 14px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
        tr:active { background: #f8faff; }
        .item-code { font-family: monospace; font-size: 13px; color: #007AFF; font-weight: 500; }
        .item-name { max-width: 200px; }
        .item-name-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; font-size: 14px; line-height: 1.4; }
        .brand-tag { display: inline-block; padding: 3px 10px; background: #e8f4ff; color: #007AFF; border-radius: 12px; font-size: 12px; }
        .disabled-tag { display: inline-block; padding: 3px 10px; background: #ffe8e8; color: #ff3b30; border-radius: 12px; font-size: 12px; }
        .enabled-tag { display: inline-block; padding: 3px 10px; background: #e8f8e8; color: #34C759; border-radius: 12px; font-size: 12px; }
        .date-text { font-size: 12px; color: #999; white-space: nowrap; }

        /* ==================== Loading & Empty ==================== */
        .loading-row td { text-align: center; padding: 40px; color: #999; }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 14px; }

        /* ==================== Pagination ==================== */
        .pagination { background: white; padding: 12px 15px; display: flex; align-items: center; justify-content: space-between; border-top: 1px solid #eee; flex-wrap: wrap; gap: 10px; }
        .pagination-info { font-size: 13px; color: #666; }
        .pagination-controls { display: flex; gap: 6px; align-items: center; }
        .page-btn { padding: 8px 14px; border: 1px solid #ddd; background: white; border-radius: 6px; font-size: 13px; cursor: pointer; color: #333; }
        .page-btn:active { background: #f0f0f0; }
        .page-btn.active { background: #007AFF; color: white; border-color: #007AFF; }
        .page-btn:disabled { color: #ccc; cursor: not-allowed; }

        /* ==================== Toast ==================== */
        .toast-container { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 2000; }
        .toast { background: #333; color: white; padding: 10px 20px; border-radius: 20px; margin-bottom: 10px; opacity: 0; transition: opacity 0.3s; font-size: 14px; white-space: nowrap; }
        .toast.show { opacity: 1; }
        .toast-success { background: #34C759; }
        .toast-error { background: #FF3B30; }

        /* ==================== Responsive: Tablet (768px+) ==================== */
        @media (min-width: 768px) {
            .header { padding: 18px 24px; }
            .header h1 { font-size: 20px; }
            .filters { padding: 16px 24px; }
            .filter-input { padding: 12px 14px; font-size: 15px; }
            .filter-select { padding: 12px 14px; font-size: 15px; }
            .stats-bar { padding: 12px 24px; font-size: 14px; }
            .pagination { padding: 14px 24px; }
            table { min-width: 800px; }
            th, td { padding: 14px 16px; font-size: 14px; }
            .item-name { max-width: 300px; }
        }

        /* ==================== Responsive: Desktop (1024px+) ==================== */
        @media (min-width: 1024px) {
            body { background: #f0f2f5; }
            .header { padding: 20px 32px; background: #fff; border-bottom: 1px solid #e0e0e0; color: #333; }
            .header h1 { font-size: 22px; color: #333; }
            .header-btn { background: #007AFF; color: white; }
            .page-container { max-width: 1400px; margin: 0 auto; padding: 24px 32px; }
            .filters { border-radius: 12px; margin-bottom: 16px; border: 1px solid #e0e0e0; padding: 20px; }
            .filter-row { flex-wrap: nowrap; }
            .filter-input { min-width: 180px; }
            .stats-bar { border-radius: 12px; margin-bottom: 16px; border: 1px solid #e0e0e0; padding: 14px 20px; }
            .table-container { border-radius: 12px; border: 1px solid #e0e0e0; overflow: hidden; }
            table { min-width: 900px; }
            th, td { padding: 14px 20px; }
            .item-name { max-width: none; }
            .pagination { border-radius: 12px; border: 1px solid #e0e0e0; margin-top: 16px; }
            .pagination-info { font-size: 14px; }
        }

        /* ==================== Responsive: Large Desktop (1200px+) ==================== */
        @media (min-width: 1200px) {
            .page-container { max-width: 1400px; padding: 32px; }
            .filters { padding: 24px; }
            .stats-bar { padding: 16px 24px; }
            table { min-width: 1100px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📦 库存查询</h1>
        <div class="header-actions">
            <button class="header-btn" onclick="exportExcel()">📥 导出Excel</button>
        </div>
    </div>

    <div class="page-container">
        <div class="filters">
            <div class="filter-row">
                <input type="text" class="filter-input" id="filter-keyword" placeholder="搜索物料名称、编码、品牌..." autocomplete="off">
                <select class="filter-select" id="filter-series">
                    <option value="">全部系列</option>
                </select>
                <select class="filter-select" id="filter-brand">
                    <option value="">全部品牌</option>
                </select>
                <select class="filter-select" id="filter-status">
                    <option value="">全部状态</option>
                    <option value="active">在售</option>
                    <option value="discontinued">停售</option>
                </select>
            </div>
            <div class="filter-row">
                <button class="filter-btn" onclick="loadInventory(1)">🔍 搜索</button>
                <button class="filter-btn secondary" onclick="resetFilters()">重置</button>
            </div>
        </div>

        <div class="stats-bar">
            共 <span id="total-count">0</span> 条数据
            <span id="page-info"></span>
        </div>

        <div class="table-container">
            <div class="table-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>物料编码</th>
                            <th>物料名称</th>
                            <th>产品系列</th>
                            <th>品牌</th>
                            <th>状态</th>
                            <th>最后修改</th>
                        </tr>
                    </thead>
                    <tbody id="inventory-tbody">
                        <tr class="loading-row"><td colspan="6">加载中...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="pagination">
            <div class="pagination-info" id="pagination-info"></div>
            <div class="pagination-controls" id="pagination-controls"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/assets/mobile_order/js/inventory.js?v=1.0.2"></script>
</body>
</html>
