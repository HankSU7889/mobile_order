<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - Mobile Order</title>
    <link rel="stylesheet" href="/assets/mobile_order/css/admin.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1>订单管理</h1>
            <button id="refresh-btn" class="btn-refresh">刷新</button>
        </header>

        <div class="nav-tabs">
            <button class="nav-tab active" data-tab="orders">订单审核</button>
            <button class="nav-tab" data-tab="sales-persons">业务员管理</button>
        </div>

        <div id="orders-panel" class="tab-panel active">
            <div class="filters">
                <select id="status-filter">
                    <option value="">全部状态</option>
                    <option value="待审核" selected>待审核</option>
                    <option value="已确认">已确认</option>
                    <option value="已拒绝">已拒绝</option>
                </select>
            </div>
            <div id="orders-list" class="list-container">
                <div class="loading">加载中...</div>
            </div>
        </div>

        <div id="sales-persons-panel" class="tab-panel">
            <div class="panel-header">
                <button id="add-sales-person-btn" class="btn-add">+ 新增业务员</button>
            </div>
            <div id="sales-persons-list" class="list-container">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <div id="order-detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>订单详情</h3>
                <button class="modal-close" data-close="order-detail-modal">&times;</button>
            </div>
            <div class="modal-body" id="order-detail-body"></div>
            <div class="modal-footer" id="order-detail-actions"></div>
        </div>
    </div>

    <div id="sales-person-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="sp-modal-title">新增业务员</h3>
                <button class="modal-close" data-close="sales-person-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="sp-old-name">
                <div class="form-group">
                    <label for="sp-name">姓名 *</label>
                    <input type="text" id="sp-name" placeholder="请输入业务员姓名">
                </div>
                <div class="form-group">
                    <label for="sp-mobile">联系电话</label>
                    <input type="text" id="sp-mobile" placeholder="请输入手机号">
                </div>
            </div>
            <div class="modal-footer">
                <button id="save-sales-person-btn" class="btn-primary">保存</button>
            </div>
        </div>
    </div>

    <div id="reject-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>拒绝订单</h3>
                <button class="modal-close" data-close="reject-modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="reject-reason">拒绝原因</label>
                    <textarea id="reject-reason" rows="3" placeholder="请输入拒绝原因（可选）"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="confirm-reject-btn" class="btn-danger">确认拒绝</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>
    <script src="/assets/mobile_order/js/admin.js"></script>
</body>
</html>
